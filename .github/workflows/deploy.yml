name: Deploy Fraud Detector

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Validate Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate imports
        run: |
          python -c "
          import fastapi, uvicorn, numpy, sklearn, xgboost
          from imblearn.over_sampling import SMOTE
          print('All imports successful')
          print('XGBoost version:', xgboost.__version__)
          "

      - name: Run full pipeline
        run: |
          python simulator/generate_transactions.py
          python training/feature_engineering.py
          python training/train_model.py

      - name: Validate model files exist
        run: |
          python -c "
          import os
          files = [
            'serving/model/fraud_model.pkl',
            'serving/model/scaler.pkl',
            'serving/model/metadata.pkl',
            'serving/model/feature_columns.pkl',
          ]
          for f in files:
            assert os.path.exists(f), f'Missing: {f}'
            print(f'Found: {f}')
          print('All model files verified')
          "

      - name: Validate model predicts correctly
        run: |
          python -c "
          import pickle, numpy as np

          with open('serving/model/fraud_model.pkl',    'rb') as f: model    = pickle.load(f)
          with open('serving/model/scaler.pkl',          'rb') as f: scaler   = pickle.load(f)
          with open('serving/model/feature_columns.pkl', 'rb') as f: features = pickle.load(f)

          print(f'Model loaded: {type(model).__name__}')
          print(f'Features   : {len(features)}')

          X = np.zeros((1, len(features)))
          X_scaled = scaler.transform(X)
          proba = model.predict_proba(X_scaled)[0][1]
          print(f'Test prediction probability: {proba:.4f}')
          print('Model validation passed')
          "

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Trigger Render Deployment
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRAUD }}" \
            -w "\nHTTP Status: %{http_code}" \
            --fail

      - name: Deployment triggered
        run: echo "Fraud Detector deployment triggered successfully"