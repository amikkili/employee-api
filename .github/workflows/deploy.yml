name: Deploy FastAPI to Render

on:
  push:
    branches: [main]      # Triggers on every push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Pull your code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2 — Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3 — Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/employee-api:latest .

      # Step 4 — Push to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-api:latest

      # Step 5 — Trigger Render Deploy via Webhook
      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_API_DEPLOY_HOOK }}